name: CI/CD

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Fix permissions
        run: sudo chown -R bot:bot /home/bot/libredesk-runner/_work || true
    
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build application
        env: 
            VITE_ESCALATION_TELEGRAM: ${{ vars.VITE_ESCALATION_TELEGRAM }}
            VITE_ESCALATION_MAX: ${{ vars.VITE_ESCALATION_MAX }}
            VITE_ESCALATION_EMAIL: ${{ vars.VITE_ESCALATION_EMAIL }}
        run: make

      - name: Deploy
        run: docker compose up -d --build
        
