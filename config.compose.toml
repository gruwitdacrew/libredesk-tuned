[app]
log_level = "info"
env = "prod"
check_updates = true
encryption_key = "your-32-char-random-string-here!"

[app.server]
address = "0.0.0.0:9000"
socket = ""
disable_secure_cookies = true
session_lifetime = "9h"
read_timeout = "5s"
write_timeout = "5s"
max_body_size = 104857600
read_buffer_size = 65536
keepalive_timeout = "10s"

[upload]
provider = "fs"

[upload.fs]
upload_path = 'uploads'

[upload.s3]
url = ""
access_key = ""
secret_key = ""
region = "ap-south-1"
bucket = "bucket-name"
bucket_path = ""
expiry = "30m"

[db]
host = "db"
port = 5432
user = "libredesk"
password = "libredesk"
database = "libredesk"
ssl_mode = "disable"
max_open = 30
max_idle = 30
max_lifetime = "300s"

[redis]
address = "redis:6379"
user = ""
password = ""
db = 0

[message]
outgoing_queue_workers = 10
incoming_queue_workers = 10
message_outgoing_scan_interval = "50ms"
incoming_queue_size = 5000
outgoing_queue_size = 5000

[notification]
concurrency = 2
queue_size = 2000

[automation]
worker_count = 10

[autoassigner]
autoassign_interval = "5m"

[webhook]
workers = 5
queue_size = 10000
timeout = "15s"
allowed_hosts = []

[conversation]
unsnooze_interval = "5m"
draft_retention_period = "360h"
continuity_scan_interval = "5m"
timeout = "2m"

[sla]
evaluation_interval = "5m"

[ai.reply]
timeout = "90s"
workers = 4
endpoint = "http://host.docker.internal:5015/ask"

[ai.cache]
ttl = "1h"
prefix = "ai_reply"
